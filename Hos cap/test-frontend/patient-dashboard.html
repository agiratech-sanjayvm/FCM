<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard — Hospital Portal</title>
    <meta name="description" content="Patient dashboard for managing appointments and receiving notifications.">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/182/182836.png">
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🏥</span>
                <span>Patient Portal</span>
            </div>
            <div class="user-info">
                <span id="user-name" class="user-name"></span>
                <span class="user-role role-patient">Patient</span>
                <button id="btn-logout" class="btn btn-ghost btn-sm">🚪 Logout</button>
            </div>
        </header>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div id="stat-total" class="stat-value">0</div>
                <div class="stat-label">Total Appointments</div>
            </div>
            <div class="stat-card">
                <div id="stat-pending" class="stat-value">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div id="stat-accepted" class="stat-value">0</div>
                <div class="stat-label">Accepted</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid-2">
            <!-- Create Appointment -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📋</span>
                    New Appointment
                </div>
                <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
                    Request a new appointment. All available doctors will be notified and one will accept your request.
                </p>
                <button id="btn-create" class="btn btn-primary btn-full">
                    ➕ Request Appointment
                </button>
            </div>

            <!-- FCM Status -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">🔔</span>
                    Notification Status
                </div>
                <div id="notif-status" style="color: var(--text-muted); font-size: 0.9rem;">
                    Initializing notifications...
                </div>
                <div id="token-display" style="margin-top: 1rem; font-size: 0.7rem; color: var(--text-dim); word-break: break-all;">
                </div>
                <button id="btn-reregister" class="btn btn-ghost btn-full btn-sm" style="margin-top: 1rem;">
                    🔄 Re-register Device
                </button>
            </div>
        </div>

        <!-- Appointments List -->
        <div class="card" style="margin-top: 1.5rem;">
            <div class="card-title">
                <span class="icon">📅</span>
                My Appointments
            </div>
            <div id="appointments-list" class="list">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>No appointments yet. Create one above!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

        // ── Auth Gate ──────────────────────────────────────────────────
        const userData = sessionStorage.getItem('user');
        if (!userData) { window.location.href = 'login.html'; }
        const currentUser = JSON.parse(userData);
        if (currentUser.role !== 'USER') { window.location.href = 'doctor-dashboard.html'; }

        document.getElementById('user-name').textContent = currentUser.name;

        const API_BASE = (window.location.port === '8080' && !window.location.hostname.includes('ngrok'))
            ? `${window.location.protocol}//${window.location.hostname}:8000`
            : window.location.origin;
        const TOKEN = sessionStorage.getItem('token');
        let messaging = null;

        // ── API Helper ────────────────────────────────────────────────
        async function apiFetch(endpoint, options = {}) {
            const url = endpoint.startsWith('http') ? endpoint : `${API_BASE}${endpoint}`;
            const headers = {
                ...options.headers,
                'Authorization': `Bearer ${TOKEN}`
            };
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) { logout(); }
            return res;
        }

        // ── DOM References ─────────────────────────────────────────────
        const DOM = {
            btnCreate: document.getElementById('btn-create'),
            btnLogout: document.getElementById('btn-logout'),
            btnReregister: document.getElementById('btn-reregister'),
            appointmentsList: document.getElementById('appointments-list'),
            notifStatus: document.getElementById('notif-status'),
            tokenDisplay: document.getElementById('token-display'),
            toastContainer: document.getElementById('toast-container'),
            statTotal: document.getElementById('stat-total'),
            statPending: document.getElementById('stat-pending'),
            statAccepted: document.getElementById('stat-accepted'),
        };

        // ── Initialize ────────────────────────────────────────────────
        async function init() {
            try {
                // Get VAPID key from backend
                const configRes = await fetch(`${API_BASE}/config`);
                const { vapidKey } = await configRes.json();

                // Firebase setup
                const firebaseConfig = {
                    apiKey: "AIzaSyBH78ReQl2cYXl8GQrxrHdv6sD7XrxUgiQ",
                    authDomain: "hospital-app-db.firebaseapp.com",
                    projectId: "hospital-app-db",
                    storageBucket: "hospital-app-db.firebasestorage.app",
                    messagingSenderId: "1001387124445",
                    appId: "1:1001387124445:web:29fcd53656252e2867dd34",
                    measurementId: "G-CLEXPZ4P0P"
                };

                const firebaseApp = initializeApp(firebaseConfig);
                messaging = getMessaging(firebaseApp);

                const registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
                console.log('Service Worker registered:', registration);
                
                await setupMessaging(vapidKey, registration);

                // Initialize BroadcastChannel
                const fcmSyncChannel = new BroadcastChannel('fcm_notification_sync');
                const processedMessageIds = new Set();

                // Listen for Broadcast Channel Messages (when tab is hidden)
                fcmSyncChannel.onmessage = (event) => {
                    const payload = event.data;
                    console.log('[Hidden Tab] Sync Notification received via Broadcast:', payload);
                    
                    // Prevent duplicate processing
                    if (payload.messageId && processedMessageIds.has(payload.messageId)) return;
                    if (payload.messageId) processedMessageIds.add(payload.messageId);
                    
                    // Update UI silently
                    refreshAppointments();
                };

                // Listen for foreground messages
                onMessage(messaging, (payload) => {
                    console.log('FCM message:', payload);
                    
                    // Prevent duplicate processing
                    if (payload.messageId && processedMessageIds.has(payload.messageId)) return;
                    if (payload.messageId) processedMessageIds.add(payload.messageId);

                    // Broadcast the payload to all other hidden tabs
                    fcmSyncChannel.postMessage(payload);

                    if (payload.notification) {
                        const title = payload.notification.title || 'Hospital Update';
                        const body = payload.notification.body || 'You have a new update.';
                        showToast(`${title}: ${body}`, 'success');

                        // Show native notification
                        if (Notification.permission === 'granted') {
                            navigator.serviceWorker.ready.then(registration => {
                                registration.showNotification(title, {
                                    body: body,
                                    icon: 'https://cdn-icons-png.flaticon.com/512/182/182836.png',
                                    vibrate: [200, 100, 200],
                                    tag: 'hospital-notif'
                                });
                            });
                        }
                    } else {
                        console.log("Data payload only, skipping toast.");
                    }

                    // Refresh data
                    refreshAppointments();
                });

                // Initial load
                refreshAppointments();
                // setInterval(refreshAppointments, 5000); // Polling disabled, relying entirely on FCM pushes

                // Event listeners
                DOM.btnCreate.onclick = createAppointment;
                DOM.btnLogout.onclick = logout;
                DOM.btnReregister.onclick = () => setupMessaging(vapidKey, registration);

            } catch (err) {
                console.error('Init error:', err);
                DOM.notifStatus.innerHTML = `<span style="color: var(--accent);">Error: ${err.message}</span>`;
            }
        }

        async function setupMessaging(vapidKey, registration) {
            try {
                console.log('Requesting notification permission...');
                DOM.notifStatus.textContent = 'Requesting permission...';
                
                const permission = await Notification.requestPermission();
                console.log('Permission status:', permission);

                if (permission === 'granted') {
                    // CRITICAL: On mobile, we MUST pass the serviceWorkerRegistration to getToken
                    const token = await getToken(messaging, { 
                        vapidKey: vapidKey, 
                        serviceWorkerRegistration: registration 
                    });
                    
                    if (token) {
                        console.log('FCM Token generated:', token);
                        await registerToken(token);
                        DOM.notifStatus.innerHTML = `<span style="color: var(--success);">✅ Push notifications active</span>`;
                        DOM.tokenDisplay.textContent = `Token: ${token.substring(0, 30)}...`;
                    } else {
                        console.warn('No FCM token received.');
                        DOM.notifStatus.innerHTML = `<span style="color: var(--warning);">⚠️ Token generation failed. Try again.</span>`;
                    }
                } else {
                    console.warn('Notification permission denied.');
                    DOM.notifStatus.innerHTML = `<span style="color: var(--warning);">⚠️ Notifications blocked — enable in browser settings</span>`;
                }
            } catch (err) {
                console.error('Messaging setup error:', err);
                DOM.notifStatus.innerHTML = `<span style="color: var(--accent);">Error: ${err.message}</span>`;
            }
        }

        async function registerToken(token) {
            await apiFetch(`/devices/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
        }

        async function createAppointment() {
            DOM.btnCreate.disabled = true;
            DOM.btnCreate.innerHTML = '<span class="spinner"></span> Creating...';

            try {
                const res = await apiFetch(`/appointments/`, { method: 'POST' });
                const data = await res.json();

                if (res.ok) {
                    showToast('Appointment created! Doctors have been notified.', 'info');
                    refreshAppointments();
                } else {
                    showToast('Error: ' + (data.detail || 'Failed'), 'warning');
                }
            } catch (err) {
                showToast('Connection error: ' + err.message, 'warning');
            } finally {
                DOM.btnCreate.disabled = false;
                DOM.btnCreate.innerHTML = '➕ Request Appointment';
            }
        }

        function updateDOMList(container, items, idPrefix, emptyStateHtml, renderItemHtml) {
            if (items.length === 0) {
                if (!container.querySelector('.empty-state')) {
                    container.innerHTML = emptyStateHtml;
                } else {
                    Array.from(container.children).forEach(child => {
                        if (!child.classList.contains('empty-state')) child.remove();
                    });
                }
                return;
            }

            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const newIds = new Set(items.map(item => `${idPrefix}-${item.id}`));

            // Remove existing children that are NOT in the new items
            Array.from(container.children).forEach(child => {
                if (child.id && child.id.startsWith(idPrefix) && !newIds.has(child.id)) {
                    // Start removing them smoothly
                    if (child.style.opacity !== '0') {
                        child.style.transition = 'all 0.3s ease-out';
                        child.style.opacity = '0';
                        child.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            if (child.parentNode) child.remove();
                        }, 300);
                    }
                }
            });

            // Iterate over the new items, update or add
            items.forEach((item, index) => {
                const id = `${idPrefix}-${item.id}`;
                let el = document.getElementById(id);
                
                // If the element doesn't exist, create it anew
                if (!el) {
                    const temp = document.createElement('div');
                    temp.innerHTML = renderItemHtml(item, id).trim();
                    el = temp.firstChild;
                    el.style.transition = 'all 0.3s ease-out';
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(10px)';
                    
                    // Always append new elements to the end for now. We can sort them later if necessary
                    container.appendChild(el);

                    requestAnimationFrame(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    });
                } else {
                    // Update only if it's completely different to avoid dropping focus/loading states
                    const temp = document.createElement('div');
                    temp.innerHTML = renderItemHtml(item, id).trim();
                    const newEl = temp.firstChild;
                    
                    // Copy innerHTML over only if changed, while preserving the wrapper
                    if (el.innerHTML !== newEl.innerHTML) {
                        el.innerHTML = newEl.innerHTML;
                    }
                }
            });

            // Ensure order matches the incoming array (crucial for sorting, but avoid moving things unnecessarily if they are already in order)
            // Sorting can sometimes cause browser layout thrashing if done on every tick.
            let currentNodes = Array.from(container.children).filter(n => n.id && n.id.startsWith(idPrefix));
            for (let i = 0; i < items.length; i++) {
                const targetId = `${idPrefix}-${items[i].id}`;
                if (currentNodes[i] && currentNodes[i].id !== targetId) {
                    const elementToMove = document.getElementById(targetId);
                    if (elementToMove) {
                        container.insertBefore(elementToMove, currentNodes[i]);
                        // Update currentNodes list after DOM mutation
                        currentNodes = Array.from(container.children).filter(n => n.id && n.id.startsWith(idPrefix));
                    }
                }
            }
        }

        async function refreshAppointments() {
            try {
                const res = await apiFetch(`/appointments-list?user_id=${currentUser.id}`);
                const appointments = await res.json();

                // Update stats
                DOM.statTotal.textContent = appointments.length;
                DOM.statPending.textContent = appointments.filter(a => a.status === 'pending').length;
                DOM.statAccepted.textContent = appointments.filter(a => a.status === 'accepted').length;

                updateDOMList(
                    DOM.appointmentsList,
                    appointments,
                    'patient-appt',
                    `<div class="empty-state"><div class="icon">📭</div><p>No appointments yet. Create one above!</p></div>`,
                    (a, id) => {
                        const time = new Date(a.created_at).toLocaleString();
                        const acceptedInfo = a.status === 'accepted' && a.accepted_at
                            ? `<div class="list-item-sub">👨‍⚕️ Accepted by Doctor #${a.doctor_id} • ${new Date(a.accepted_at).toLocaleTimeString()}</div>`
                            : '';

                        return `
                            <div id="${id}" class="list-item">
                                <div class="list-item-info">
                                    <div class="list-item-id">Appointment #${a.id}</div>
                                    <div class="list-item-main">🕐 ${time}</div>
                                    ${acceptedInfo}
                                </div>
                                <span class="badge badge-${a.status}">${a.status}</span>
                            </div>`.trim();
                    }
                );

            } catch (err) {
                console.error('Refresh error:', err);
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            DOM.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 6000);
        }

        function logout() {
            sessionStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
